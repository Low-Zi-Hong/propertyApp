<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tenancy Agreement Generator</title>

  <!-- Icons (same as main app) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
  <!-- Inter font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <!-- Quill editor -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/quill/1.3.7/quill.snow.min.css" rel="stylesheet">

  <link rel="stylesheet" href="/src/docse.css">
</head>
<body>

  <!-- ── Top Bar ──────────────────────────────────────────────── -->
  <div class="topbar">
    <button id="back-btn"><i class="ti ti-arrow-left"></i> Back</button>
    <div class="topbar-divider"></div>
    <span class="topbar-title">Tenancy Agreement Generator</span>
    <div class="topbar-spacer"></div>
    <button id="save-btn"><i class="ti ti-device-floppy"></i> Save to DB</button>
    <button id="pdf-btn"><i class="ti ti-file-type-pdf"></i> Export PDF</button>
    <button id="word-btn"><i class="ti ti-file-type-doc"></i> Export Word</button>
  </div>

  <!-- ── Body ─────────────────────────────────────────────────── -->
  <div class="body">

    <!-- Left: Input Form -->
    <div class="form-panel">

      <div class="form-header">
        <span class="group-label">Tenancy Details</span>
        <button class="autofill-btn" id="autofill-btn">
          <i class="ti ti-bolt"></i> Auto-Fill from Selected Property
        </button>
      </div>

      <div class="form-fields">

        <div class="field-row">
          <label for="ag-tenant-name">Tenant Full Name</label>
          <input id="ag-tenant-name" class="styled-input" type="text" placeholder="e.g. Ahmad bin Razak">
        </div>

        <div class="field-row">
          <label for="ag-tenant-ic">Tenant IC / Passport No.</label>
          <input id="ag-tenant-ic" class="styled-input" type="text" placeholder="e.g. 900101-14-5678">
        </div>

        <div class="field-row">
          <label for="ag-property-addr">Property Address</label>
          <textarea id="ag-property-addr" class="styled-input" rows="3" placeholder="Full property address..."></textarea>
        </div>

        <div class="field-row">
          <label for="ag-monthly-rent">Monthly Rental (RM)</label>
          <input id="ag-monthly-rent" class="styled-input" type="text" placeholder="e.g. 1,500">
        </div>

        <div class="field-row">
          <label for="ag-deposit">Security Deposit (RM)</label>
          <input id="ag-deposit" class="styled-input" type="text" placeholder="e.g. 3,000">
        </div>

        <div class="field-row-split">
          <div class="field-row">
            <label for="ag-start-date">Start Date</label>
            <input id="ag-start-date" class="styled-input" type="date">
          </div>
          <div class="field-row">
            <label for="ag-end-date">End Date</label>
            <input id="ag-end-date" class="styled-input" type="date">
          </div>
        </div>

        <div class="field-row">
          <label for="ag-landlord-name">Landlord Full Name</label>
          <input id="ag-landlord-name" class="styled-input" type="text" placeholder="e.g. Canny Chong">
        </div>

        <div class="field-row">
          <label for="ag-landlord-ic">Landlord IC / Passport No.</label>
          <input id="ag-landlord-ic" class="styled-input" type="text" placeholder="e.g. 800202-10-1234">
        </div>

      </div>
    </div>

    <!-- Right: Quill Editor -->
    <div class="editor-panel">
      <div id="ag-toolbar"></div>
      <div id="ag-editor"></div>
    </div>

  </div>

  <!-- Quill JS -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/quill/1.3.7/quill.min.js"></script>
  <!-- agreement.ts compiled output -->
  <script type="module" src="./agreement.ts"></script>

</body>
</html>
