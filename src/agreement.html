<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agreement Editor</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/quill/1.3.7/quill.snow.min.css" rel="stylesheet">

  <style>
    :root {
      --font:          'Inter', system-ui, sans-serif;
      --bg:            #ffffff;
      --bg-subtle:     #f7f7f6;
      --bg-hover:      #f0f0ee;
      --border:        rgba(0,0,0,0.09);
      --border-md:     rgba(0,0,0,0.16);
      --border-focus:  #60a5fa;
      --text:          #111110;
      --text-2:        #6b6b68;
      --text-3:        #a1a19e;
      --info-bg:       #eff6ff;
      --info-text:     #1d4ed8;
      --r-sm:  5px;
      --r-md:  8px;
      --r-lg:  12px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      font-size: 14px;
      color: var(--text);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Top bar ─────────────────────────────────────────────── */
    .editor-topbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 16px;
      height: 48px;
      border-bottom: 0.5px solid var(--border);
      background: var(--bg-subtle);
      flex-shrink: 0;
    }
    .topbar-divider { width: 0.5px; height: 18px; background: var(--border-md); }
    .topbar-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── Body split ──────────────────────────────────────────── */
    .editor-body {
      display: grid;
      grid-template-columns: 300px 1fr;
      flex: 1;
      overflow: hidden;
      min-height: 0;
    }

    /* ── Left: form ──────────────────────────────────────────── */
    .editor-form {
      display: flex;
      flex-direction: column;
      border-right: 0.5px solid var(--border);
      overflow-y: auto;
      background: var(--bg);
    }

    .form-section {
      padding: 14px 16px;
      border-bottom: 0.5px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 11px;
    }

    .form-section-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-3);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .field-row { display: flex; flex-direction: column; gap: 4px; }
    .field-row label { font-size: 12px; font-weight: 500; color: var(--text-2); }

    .field-row-split {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .styled-input {
      width: 100%;
      font-size: 13px;
      font-family: var(--font);
      color: var(--text);
      background: var(--bg);
      border: 0.5px solid var(--border-md);
      border-radius: var(--r-md);
      padding: 7px 10px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .styled-input::placeholder { color: var(--text-3); }
    .styled-input:focus {
      border-color: var(--border-focus);
      box-shadow: 0 0 0 3px rgba(96,165,250,0.18);
    }
    textarea.styled-input { resize: vertical; line-height: 1.5; }

    .generate-btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-size: 13px;
      font-family: var(--font);
      padding: 8px 12px;
      border: 0.5px solid var(--border-focus);
      border-radius: var(--r-md);
      background: var(--info-bg);
      color: var(--info-text);
      cursor: pointer;
      transition: opacity 0.1s;
    }
    .generate-btn:hover { opacity: 0.82; }
    .generate-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Right: document editor ──────────────────────────────── */
    .editor-doc {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: #e8e5e0;  /* paper tray */
    }

    .ql-toolbar.ql-snow {
      border: none !important;
      border-bottom: 0.5px solid var(--border) !important;
      background: var(--bg-subtle);
      padding: 6px 16px;
      flex-shrink: 0;
    }

    .ql-container.ql-snow {
      border: none !important;
      flex: 1;
      overflow-y: auto;
      font-family: var(--font);
      font-size: 14px;
    }

    /* Word-page illusion */
    .ql-editor {
      min-height: calc(100vh - 100px);
      max-width: 820px;
      margin: 28px auto;
      padding: 72px 80px;
      background: #ffffff;
      box-shadow: 0 1px 6px rgba(0,0,0,0.12);
      border-radius: 2px;
      line-height: 1.9;
      color: var(--text);
      font-size: 14px;
    }
    .ql-editor p { margin-bottom: 4px; }
    .ql-editor strong { font-weight: 600; }

    /* ── Buttons ─────────────────────────────────────────────── */
    button {
      font-family: var(--font);
      font-size: 13px;
      cursor: pointer;
      border: 0.5px solid var(--border-md);
      background: transparent;
      color: var(--text-2);
      border-radius: var(--r-md);
      padding: 6px 12px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: background 0.1s, color 0.1s;
      white-space: nowrap;
    }
    button:hover { background: var(--bg-hover); color: var(--text); }
    button:active { transform: scale(0.98); }
    button:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .btn-primary { background: var(--text); color: var(--bg); border-color: transparent; }
    .btn-primary:hover { opacity: 0.82; background: var(--text); color: var(--bg); }

    /* ── Scrollbar ───────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-md); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-3); }
  </style>
</head>
<body>

  <!-- Top Bar -->
  <div class="editor-topbar">
    <button id="editor-close-btn"><i class="ti ti-x"></i></button>
    <div class="topbar-divider"></div>
    <span class="topbar-title" id="editor-doc-title">New Tenancy Agreement</span>
    <button id="editor-save-btn"><i class="ti ti-device-floppy"></i> Save</button>
    <button id="editor-pdf-btn"><i class="ti ti-file-type-pdf"></i> Export PDF</button>
    <button id="editor-word-btn"><i class="ti ti-file-type-doc"></i> Export Word</button>
  </div>

  <!-- Body -->
  <div class="editor-body">

    <!-- Left: form -->
    <div class="editor-form">

      <div class="form-section">
        <span class="form-section-label">Property</span>
        <div class="field-row">
          <label for="ag-property-addr">Property Address</label>
          <textarea id="ag-property-addr" class="styled-input" rows="2" placeholder="Full address..."></textarea>
        </div>
        <div class="field-row">
          <label for="ag-monthly-rent">Monthly Rental (RM)</label>
          <input id="ag-monthly-rent" class="styled-input" type="text" placeholder="e.g. 1,500">
        </div>
        <div class="field-row">
          <label for="ag-deposit">Security Deposit (RM)</label>
          <input id="ag-deposit" class="styled-input" type="text" placeholder="e.g. 3,000">
        </div>
        <div class="field-row-split">
          <div class="field-row">
            <label for="ag-start-date">Start Date</label>
            <input id="ag-start-date" class="styled-input" type="date">
          </div>
          <div class="field-row">
            <label for="ag-end-date">End Date</label>
            <input id="ag-end-date" class="styled-input" type="date">
          </div>
        </div>
      </div>

      <div class="form-section">
        <span class="form-section-label">Landlord</span>
        <div class="field-row">
          <label for="ag-landlord-name">Full Name</label>
          <input id="ag-landlord-name" class="styled-input" type="text" placeholder="e.g. Canny Chong">
        </div>
        <div class="field-row">
          <label for="ag-landlord-ic">IC / Passport No.</label>
          <input id="ag-landlord-ic" class="styled-input" type="text" placeholder="e.g. 800202-10-1234">
        </div>
      </div>

      <div class="form-section">
        <span class="form-section-label">Tenant</span>
        <div class="field-row">
          <label for="ag-tenant-name">Full Name</label>
          <input id="ag-tenant-name" class="styled-input" type="text" placeholder="e.g. Ahmad bin Razak">
        </div>
        <div class="field-row">
          <label for="ag-tenant-ic">IC / Passport No.</label>
          <input id="ag-tenant-ic" class="styled-input" type="text" placeholder="e.g. 900101-14-5678">
        </div>
      </div>

      <div class="form-section">
        <button class="generate-btn" id="ag-generate-btn">
          <i class="ti ti-wand"></i> Generate Agreement
        </button>
      </div>

    </div>

    <!-- Right: Quill Word-like editor -->
    <div class="editor-doc">
      <div id="ag-toolbar"></div>
      <div id="ag-editor"></div>
    </div>

  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/quill/1.3.7/quill.min.js"></script>
  <script type="module" src="./agreement.js"></script>
</body>
</html>
