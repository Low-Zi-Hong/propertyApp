<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Property Bot Manager</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <link rel="stylesheet" href="/src/styles.css" />
</head>
<body>

<div id="main-view" class="app">

  <div class="header">
    <span class="app-title">PropBot</span>
    <div class="tabs">
      <div class="tab active" data-tab="new">
        New <span class="tab-count" id="new-count">0</span>
      </div>
      <div class="tab" data-tab="all">
        All properties <span class="tab-count" id="all-count">0</span>
      </div>
    </div>
    <div class="header-right">
      <div class="bot-pill">
        <div class="bot-dot" id="bot-dot"></div>
        <span id="bot-status-label">Connecting…</span>
      </div>
    </div>
  </div>

  <div class="main">
    <div class="toolbar">
      <span class="toolbar-label" id="toolbar-label">Loading…</span>
      <div class="toolbar-spacer"></div>
      <div class="search-box">
        <i class="ti ti-search" aria-hidden="true"></i>
        <input type="text" id="search-input" placeholder="Search…" />
      </div>
      <div class="icon-btn" title="Filter"><i class="ti ti-filter" aria-hidden="true"></i></div>
      <div class="icon-btn" title="Sort"><i class="ti ti-arrows-sort" aria-hidden="true"></i></div>
    </div>

    <div class="card-grid" id="card-grid">
      <div class="grid-empty" id="grid-empty">
        <i class="ti ti-inbox"></i>
        <span>No properties yet</span>
      </div>
    </div>

    <div class="action-bar" id="action-bar" style="display: none;">
      <span class="action-label" id="sel-label">0 selected</span>
      <div class="action-spacer"></div>
      <button class="btn" id="clear-btn">
        <i class="ti ti-x" aria-hidden="true"></i> Clear
      </button>
      <button class="btn primary" id="process-btn">
        <i class="ti ti-arrow-right" aria-hidden="true"></i> Process selected
      </button>
    </div>
  </div>

  <div class="detail">
    <div class="detail-header">
      <i class="ti ti-home" aria-hidden="true"></i>
      Property details
    </div>

    <div class="detail-empty" id="detail-empty">
      <i class="ti ti-hand-click" aria-hidden="true"></i>
      <span>Select a property</span>
    </div>

    <div class="detail-filled hidden" id="detail-filled">
      <div class="detail-thumb" id="detail-thumb">
        <i class="ti ti-building" aria-hidden="true"></i>
      </div>
      <div class="detail-body">
        <div class="field">
          <div class="field-label">Address</div>
          <div class="field-value" id="d-addr">—</div>
        </div>
        <div class="field">
          <div class="field-label">Folder ID</div>
          <div class="field-value" id="d-id">—</div>
        </div>
        <div class="field">
          <div class="field-label">Source channel</div>
          <div class="field-value" id="d-source">—</div>
        </div>
        <div class="field">
          <div class="field-label">Received</div>
          <div class="field-value" id="d-time">—</div>
        </div>
        <div class="field">
          <div class="field-label">Description (from Telegram)</div>
          <textarea class="desc-box" id="d-desc" rows="5"></textarea>
        </div>
      </div>
      <div class="detail-footer">
        <button class="btn" id="archive-btn">
          <i class="ti ti-archive" aria-hidden="true"></i> Archive
        </button>
        <button class="btn primary" id="single-process-btn">
          <i class="ti ti-arrow-right" aria-hidden="true"></i> Process
        </button>
      </div>
    </div>
  </div>
</div>

<div id="process-view" class="app hidden" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 999; background: #fff;">
  
  <div class="process-header" style="grid-column: 1 / -1; display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; border-bottom: 1px solid var(--border-md);">
    <div style="display: flex; align-items: center; gap: 15px;">
      <button id="back-to-list-btn" class="back-btn" style="border:none; background:transparent; cursor:pointer; font-size:14px; display:flex; align-items:center; gap:5px;"><i class="ti ti-arrow-left"></i> Back</button>
      <div class="title" id="process-title" style="font-weight: 600; font-size: 16px;">Processing Property</div>
    </div>
    <div class="status-indicator" id="process-progress" style="font-size: 14px; color: var(--text-2);">1 of 3</div>
  </div>

  <div class="main-conten" style="padding: 20px; overflow-y: auto;">
    <div class="photo-grid" id="process-photo-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px;">
      </div>
  </div>

  <div class="sidebar" style="border-left: 1px solid var(--border-md); display: flex; flex-direction: column;">
    <div class="sidebar-content" style="padding: 20px; flex: 1; display: flex; flex-direction: column; gap: 15px;">
      <div class="ai-toolbar">
    <button id="ai-enhance-btn" class="btn"><i class="ti ti-sparkles"></i> AI Enhance</button>
    <button id="add-watermark-btn" class="btn"><i class="ti ti-language"></i> Add Watermark</button>
  </div>

  <div class="input-group">
    <label class="input-label">Title</label>
    <input type="text" id="process-title-input" class="styled-input" placeholder="e.g. Luxurious 3-Storey Villa">
  </div>

  <div class="input-group">
    <label class="input-label">Price</label>
    <input type="text" id="process-price-input" class="styled-input" placeholder="e.g. RM 1.2M">
  </div>

  <div class="input-group">
    <label class="input-label">Condition</label>
    <input type="text" id="process-condition-input" class="styled-input" placeholder="e.g. Fully Furnished">
  </div>

  <div class="input-group">
    <label class="input-label">Location</label>
    <input type="text" id="process-location-input" class="styled-input" placeholder="e.g. Ipoh">
  </div>

  <div class="input-group desc-group">
    <label class="input-label">Detailed Description</label>
    <textarea id="process-desc-editor" class="text-editor"></textarea>
  </div>
    </div>
    <div class="sidebar-footer" style="padding: 20px; border-top: 1px solid var(--border-md); display: flex; gap: 10px;">
      <button id="process-skip-btn" class="btn" style="flex: 1;">Skip</button>
      <button id="process-save-btn" class="btn primary" style="flex: 2; justify-content: center;">Save & Next</button>
    </div>
  </div>
  
</div>

<script type="module" src="/src/main.ts"></script>
</body>
</html>
